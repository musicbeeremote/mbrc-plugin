[package]
name = "mbrc-wire"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
description = "MusicBee Remote legacy wire protocol: CRLF-JSON framing, {context,data} messages, client handshake."

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# Property-based fuzzing of the parser/sanitizers on stable (cargo-fuzz needs
# nightly; the toolchain is pinned to stable). Runs under `cargo test` + CI.
proptest = "=1.11.0"
