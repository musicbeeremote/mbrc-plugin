name: rust-workspace

# CI for the root Rust workspace: the plugin core (packages/mbrc-core), the
# shared crates (packages/mbrc-*), and the headless CLI (tools/mbrc-cli). The
# Tauri api-debugger has its own workflow (api-debugger.yml) and is excluded
# from this workspace, so it isn't built here. mbrc-core additionally gets an
# i686 cross-build (its ship target as the plugin's native cdylib) and the
# workspace is measured for coverage.
on:
  push:
    branches: [ main ]
    paths:
      - 'packages/mbrc-core/**'
      - 'packages/mbrc-wire/**'
      - 'packages/mbrc-capture/**'
      - 'packages/mbrc-discovery/**'
      - 'tools/mbrc-cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/mbrc-core/**'
      - 'packages/mbrc-wire/**'
      - 'packages/mbrc-capture/**'
      - 'packages/mbrc-discovery/**'
      - 'tools/mbrc-cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

concurrency:
  group: rust-workspace-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: fmt + clippy + test
    # Windows is the plugin's ship target; ubuntu is the fast common case. Run
    # both so the shared crates + CLI stay portable and pass where they ship.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: setup Rust components
        run: rustup component add rustfmt clippy

      - name: cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: check formatting
        run: cargo fmt --all --check

      - name: clippy (warnings as errors)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: test
        run: cargo test --locked

      # mbrc-core ships as the plugin's native cdylib built for 32-bit Windows.
      # Cross-build it on the Windows runner so i686-only breakage (linking,
      # target-cfg, pointer width) is caught here, not only in the C# CI.
      - name: build mbrc-core (i686 plugin profile)
        if: matrix.os == 'windows-latest'
        run: |
          rustup target add i686-pc-windows-msvc
          cargo build -p mbrc-core --target i686-pc-windows-msvc --profile plugin --locked

  coverage:
    name: coverage
    # Windows: mbrc-core is the Windows plugin cdylib, and this matches where the
    # test matrix is green, so coverage compiles the whole workspace reliably.
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: setup Rust (llvm-tools)
        run: rustup component add llvm-tools-preview

      - name: cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: install cargo-llvm-cov
        # Installed from crates.io (version-pinned) rather than a third-party
        # action; rust-cache keeps the compiled binary warm across runs.
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      - name: collect coverage (lcov)
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info

      - name: upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          fail_ci_if_error: false
          verbose: true
